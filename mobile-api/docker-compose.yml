services:
  db:
    image: postgres:16-alpine
    container_name: mobile_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mobile_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobile_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: mobile_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mobile_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET:-troque_este_secret_em_producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
